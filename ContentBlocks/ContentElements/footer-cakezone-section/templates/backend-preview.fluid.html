<html xmlns="http://www.w3.org/1999/xhtml" lang="en"
      xmlns:f="https://viewhelpers.fluidtypo3.org/typo3/cms-fluid/9.3.2/schema.xsd"
      xmlns:ce="http://typo3.org/ns/TYPO3/CMS/FluidStyledContent/ViewHelpers"
      data-namespace-typo3-fluid="true">
      
<f:layout name="Preview" />
<f:section name="Content">

<div class="d-flex flex-column align-items-center justify-content-center text-center h-100 bg-primary border-inner p-4">

    <f:if condition="{data.url}">
            <f:if condition="{data.title}">
                <h1 class="m-0 text-uppercase text-white">
                    <f:if condition="{data.icon.0}"><f:image image="{data.icon.0}" width="40" height="50" class="me-3"/></f:if>{data.title}
                </h1>
            </f:if>
    </f:if>

    <f:if condition="{data.details}">
        {data.details -> f:format.raw()}
    </f:if>

</div>
</f:section>
</html>
