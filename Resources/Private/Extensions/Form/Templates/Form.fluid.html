<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:formvh="http://typo3.org/ns/TYPO3/CMS/Form/ViewHelpers" data-namespace-typo3-fluid="true">
<f:if condition="{form.identifier} == 'form-45'">
    <f:then>
        <formvh:renderRenderable renderable="{form}">
            <formvh:form object="{form}" action="{form.renderingOptions.controllerAction}"
                method="{form.renderingOptions.httpMethod}" id="{form.identifier}" section="{form.identifier}"
                enctype="{form.renderingOptions.httpEnctype}" addQueryString="{form.renderingOptions.addQueryString}"
                argumentsToBeExcludedFromQueryString="{form.renderingOptions.argumentsToBeExcludedFromQueryString}"
                additionalParams="{form.renderingOptions.additionalParams}"
                additionalAttributes="{formvh:translateElementProperty(element: form, property: 'fluidAdditionalAttributes')}">

                <div class="input-group">
                    <f:render partial="{form.currentPage.templateName}" arguments="{page: form.currentPage}" />

                    <f:comment>
                        <f:render partial="Form/Navigation" arguments="{form: form}" />
                    </f:comment>
                    <f:form.button property="__currentPage" value="{form.pages -> f:count()}" class="btn btn-primary ">
                        {formvh:translateElementProperty(element: form, renderingOptionProperty: 'submitButtonLabel')}
                    </f:form.button>
                </div>

            </formvh:form>
        </formvh:renderRenderable>
    </f:then>
    <f:else>

                <div class="row justify-content-center">
                    <div class="col-lg-6">
                        <formvh:renderRenderable renderable="{form}">
                            <formvh:form object="{form}" action="{form.renderingOptions.controllerAction}"
                                method="{form.renderingOptions.httpMethod}" id="{form.identifier}"
                                section="{form.identifier}" enctype="{form.renderingOptions.httpEnctype}"
                                addQueryString="{form.renderingOptions.addQueryString}"
                                argumentsToBeExcludedFromQueryString="{form.renderingOptions.argumentsToBeExcludedFromQueryString}"
                                additionalParams="{form.renderingOptions.additionalParams}"
                                additionalAttributes="{formvh:translateElementProperty(element: form, property: 'fluidAdditionalAttributes')}">


                                <div class="row g-3">
                                    <f:render partial="{form.currentPage.templateName}"
                                        arguments="{page: form.currentPage}" />

                                    <f:comment>
                                        <f:render partial="Form/Navigation" arguments="{form: form}" />
                                    </f:comment>
                                    <div class="col-sm-12">
                                        <f:form.button property="__currentPage" value="{form.pages -> f:count()}"
                                            class="btn btn-primary border-inner w-100 py-3">
                                            {formvh:translateElementProperty(element: form, renderingOptionProperty:
                                            'submitButtonLabel')}
                                        </f:form.button>
                                    </div>
                                </div>

                            </formvh:form>
                        </formvh:renderRenderable>
                    </div>
                </div>
    </f:else>
</f:if>

</html>
