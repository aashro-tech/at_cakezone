<f:variable name="marginTop">{data.footer_margin}</f:variable>

<div class="container-fluid bg-img text-secondary"
     style="margin-top: {marginTop}px;">
    <div class="container">
        <div class="row gx-5">
			<f:if condition="{data.pid} == 0"><f:then><div class="col-lg-4 col-md-6 mb-lg-n5"></f:then><f:else><div class="col-lg-4 col-md-6 mt-lg-n5"></f:else></f:if>
				<f:cObject typoscriptObjectPath="lib.FooterPart1" />
			</div>
			<div class="col-lg-8 col-md-6">
                <div class="row gx-5">
                	<div class="col-lg-4 col-md-12 pt-5 mb-5">
						<f:cObject typoscriptObjectPath="lib.FooterPart2" />
					</div>
					<div class="col-lg-4 col-md-12 pt-0 pt-lg-5 mb-5">
						<f:cObject typoscriptObjectPath="lib.FooterPart3" />
					</div>
					<div class="col-lg-4 col-md-12 pt-0 pt-lg-5 mb-5">
						<f:cObject typoscriptObjectPath="lib.FooterPart4" />
					</div>
				</div>
			</div>
        </div>
    </div>
</div>
<f:cObject typoscriptObjectPath="lib.footerCopyright" />

<a href="#" class="btn btn-primary border-inner py-3 fs-4 back-to-top" style="display: none;"><i class="bi bi-arrow-up"></i></a>
