base: /
dependencies:
  - typo3/fluid-styled-content
  - typo3/form
  - typo3/seo-sitemap
  - atcakezone/content-blocks-bundle
  - aashro/at-cakezone
errorHandling:
  -
    errorCode: 404
    errorHandler: Page
    errorContentSource: 't3://page?uid=12'
languages:
  -
    title: English
    enabled: true
    languageId: 0
    base: /
    locale: en_US.UTF-8
    navigationTitle: English
    flag: us
rootPageId: 1
routeEnhancers:
  PageTypeSuffix:
    type: PageType
    map:
      /: 0
      sitemap.xml: 1533906435
routes:
  -
    route: robots.txt
    type: staticText
    content: "User-agent: *\r\nDisallow: /typo3/\r\nDisallow: /typo3_src/\r\nDisallow: /fileadmin/user_upload/_temp_/importexport\r\n# Uncomment the following line if you have a sitemap enabled. Replace the domain with your own."
websiteTitle: CakeZone
